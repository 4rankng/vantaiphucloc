name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Run alembic migrations against SQLite test DB
        env:
          DATABASE_URL: sqlite+aiosqlite:///./ci_migrations.db
          SECRET_KEY: ci-secret-key-not-for-production
          REDIS_URL: redis://localhost:6379/0
        run: |
          PYTHONPATH=. alembic upgrade head || \
            echo "::warning::alembic upgrade head failed against SQLite — migrations may be Postgres-only. Tests use Base.metadata.create_all instead, so this is non-blocking."

      - name: Run pytest with coverage
        env:
          SECRET_KEY: ci-secret-key-not-for-production
          REDIS_URL: redis://localhost:6379/0
        run: |
          PYTHONPATH=. coverage run -m pytest -q
          coverage xml -o coverage.xml
          coverage report

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: warn

  frontend:
    name: Frontend (typecheck, lint, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck (tsc --noEmit)
        run: pnpm exec tsc --noEmit

      - name: ESLint
        run: pnpm exec eslint .

      - name: Vitest
        run: |
          if pnpm exec vitest --version >/dev/null 2>&1; then
            pnpm exec vitest run
          else
            echo "::notice::Vitest is not installed — skipping unit tests."
          fi

      - name: Vite build
        run: pnpm exec vite build

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: warn

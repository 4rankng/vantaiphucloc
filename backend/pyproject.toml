[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.hypothesis]
max_examples = 100

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]  # Default subset: syntax errors, runtime errors, unused imports
ignore = ["E402", "F403", "F405", "F821"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["E702"]  # semicolons in test setup are acceptable

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <defs>
    <linearGradient id="ev-road" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#E4E4E7" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#D4D4D8" stop-opacity="0.6"/>
      <stop offset="80%"  stop-color="#D4D4D8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E4E4E7" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="ev-shadow" cx="50%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#A1A1AA" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#A1A1AA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="122" cy="157" rx="80" ry="6" fill="url(#ev-shadow)"/>

  <!-- Road surface -->
  <rect x="0" y="148" width="240" height="11" fill="url(#ev-road)"/>
  <g stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" opacity="0.45">
    <line x1="24"  y1="153.5" x2="42"  y2="153.5"/>
    <line x1="58"  y1="153.5" x2="76"  y2="153.5"/>
    <line x1="92"  y1="153.5" x2="110" y2="153.5"/>
    <line x1="126" y1="153.5" x2="144" y2="153.5"/>
    <line x1="160" y1="153.5" x2="178" y2="153.5"/>
  </g>

  <!-- Ghost chassis -->
  <rect x="62" y="138" width="90" height="8" rx="3"
        stroke="#C8C8CC" stroke-width="1.1" stroke-dasharray="4 3" fill="none"/>

  <!-- Ghost cargo container -->
  <rect x="60" y="74" width="92" height="68" rx="5"
        stroke="#C8C8CC" stroke-width="1.5" stroke-dasharray="5 3.5" fill="none"/>

  <!-- Vertical ribs -->
  <g stroke="#DCDCE0" stroke-width="0.7" stroke-opacity="0.5">
    <line x1="84"  y1="78" x2="84"  y2="138"/>
    <line x1="104" y1="78" x2="104" y2="138"/>
    <line x1="124" y1="78" x2="124" y2="138"/>
  </g>

  <!-- Door seam -->
  <line x1="122" y1="78" x2="122" y2="138"
        stroke="#C8C8CC" stroke-width="0.9" stroke-dasharray="3 3" stroke-opacity="0.5"/>

  <!-- Ghost cab body -->
  <path d="M152 82 L184 82 Q192 82 192 90 L192 140 L152 140 Z"
        stroke="#C8C8CC" stroke-width="1.5" stroke-dasharray="5 3.5" fill="none"/>

  <!-- Cab roof curve -->
  <path d="M152 82 Q166 77 184 82"
        stroke="#C8C8CC" stroke-width="1.1" stroke-dasharray="3 2" fill="none"/>

  <!-- Ghost window -->
  <path d="M156 88 L184 88 Q188 88 188 92 L188 118 L156 118 Z"
        stroke="#DCDCE0" stroke-width="1" stroke-dasharray="4 3" fill="none"/>

  <!-- Ghost grille panel -->
  <rect x="189" y="102" width="3" height="24" rx="1"
        fill="#DCDCE0" fill-opacity="0.7"/>

  <!-- Headlight (very dim) -->
  <rect x="188" y="128" width="4" height="5" rx="1"
        fill="none" stroke="#DCDCE0" stroke-width="0.7"/>

  <!-- Ghost rear wheel -->
  <circle cx="90"  cy="148" r="12"
          stroke="#C8C8CC" stroke-width="1.4" stroke-dasharray="4 3" fill="none"/>
  <circle cx="90"  cy="148" r="3.5"
          stroke="#DCDCE0" stroke-width="0.9" fill="none"/>

  <!-- Ghost front wheel -->
  <circle cx="174" cy="148" r="12"
          stroke="#C8C8CC" stroke-width="1.4" stroke-dasharray="4 3" fill="none"/>
  <circle cx="174" cy="148" r="3.5"
          stroke="#DCDCE0" stroke-width="0.9" fill="none"/>

  <!-- Vendor badge -->
  <circle cx="106" cy="50" r="19" fill="none" stroke="#DCDCE0" stroke-width="1.4"/>

  <!-- Store / building icon inside badge -->
  <rect x="97" y="47" width="18" height="13" rx="1.5"
        stroke="#C4C4C8" stroke-width="1.3" fill="none"/>
  <path d="M95 47 L117 47" stroke="#C4C4C8" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M93 47 L106 40 L119 47" stroke="#C4C4C8" stroke-width="1.2" stroke-linejoin="round" fill="none"/>
  <rect x="103" y="52" width="6" height="8" rx="1"
        stroke="#C4C4C8" stroke-width="1" fill="none"/>
  <rect x="98"  y="49" width="4" height="4" rx="0.7"
        stroke="#C4C4C8" stroke-width="0.9" fill="none"/>
  <rect x="113" y="49" width="4" height="4" rx="0.7"
        stroke="#C4C4C8" stroke-width="0.9" fill="none"/>

  <!-- External arrow hint -->
  <g stroke="#D4D4D8" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.6">
    <line x1="210" y1="110" x2="198" y2="110"/>
    <polyline points="201,106 197,110 201,114" fill="none" stroke-linejoin="round"/>
  </g>

  <!-- Muted sparkles -->
  <g stroke="#DCDCE0" stroke-width="1.2" stroke-linecap="round" opacity="0.5">
    <line x1="215" y1="82" x2="220" y2="87"/>
    <line x1="220" y1="82" x2="215" y2="87"/>
  </g>
  <g stroke="#DCDCE0" stroke-width="1" stroke-linecap="round" opacity="0.4">
    <line x1="28" y1="70" x2="32" y2="74"/>
    <line x1="32" y1="70" x2="28" y2="74"/>
  </g>
  <circle cx="36"  cy="60" r="1.8" fill="#DCDCE0" fill-opacity="0.5"/>
  <circle cx="214" cy="66" r="1.4" fill="#DCDCE0" fill-opacity="0.45"/>
</svg>

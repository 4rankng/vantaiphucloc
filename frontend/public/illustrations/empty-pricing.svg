<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <defs>
    <linearGradient id="ep-tag-front" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>
    <linearGradient id="ep-tag-back" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#F4F4F5"/>
    </linearGradient>
    <linearGradient id="ep-coin" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <radialGradient id="ep-shadow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>
    <filter id="ep-drop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#059669" flood-opacity="0.14"/>
    </filter>
    <filter id="ep-coin-drop" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#D97706" flood-opacity="0.2"/>
    </filter>
    <!-- Tag highlight gradient -->
    <linearGradient id="ep-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="120" cy="172" rx="72" ry="7.5" fill="url(#ep-shadow)"/>

  <!-- ── Back tag (muted, rotated slightly) ── -->
  <g opacity="0.32">
    <path d="M60 72 L112 72 L158 118 L112 162 L60 162 Z"
          fill="url(#ep-tag-back)" stroke="#E4E4E7" stroke-width="1.5" stroke-linejoin="round"
          transform="rotate(-8 109 117)"/>
    <circle cx="76" cy="117" r="6" fill="#FFFFFF" stroke="#E4E4E7" stroke-width="1.5"
            transform="rotate(-8 109 117)"/>
  </g>

  <!-- ── Front price tag ── -->
  <g filter="url(#ep-drop)">
    <!-- Tag body -->
    <path d="M78 58 L142 58 L192 108 L142 158 L78 158 Z"
          fill="url(#ep-tag-front)" stroke="#059669" stroke-width="2" stroke-linejoin="round"/>
    <!-- Top highlight strip -->
    <path d="M80 60 L140 60 L148 68 L80 68 Z" fill="#FFFFFF" fill-opacity="0.45"/>
    <!-- Tag fold shadow (right edge) -->
    <path d="M192 108 L184 100 L184 116 Z" fill="#047857" fill-opacity="0.15"/>

    <!-- Tag hole -->
    <circle cx="97" cy="108" r="10" fill="#FFFFFF" stroke="#059669" stroke-width="2.2"/>
    <circle cx="97" cy="108" r="4"  fill="#059669"/>
    <circle cx="97" cy="108" r="2"  fill="#ECFDF5"/>
    <!-- String through hole -->
    <path d="M97 98 Q92 88 86 80" stroke="#A1A1AA" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="2 2.5"/>

    <!-- Price lines on tag -->
    <rect x="116" y="88"  width="52" height="7" rx="2.5" fill="#059669"/>
    <rect x="116" y="103" width="40" height="5" rx="2"   fill="#059669" fill-opacity="0.45"/>
    <rect x="116" y="116" width="46" height="5" rx="2"   fill="#059669" fill-opacity="0.45"/>
    <rect x="116" y="129" width="32" height="5" rx="2"   fill="#059669" fill-opacity="0.3"/>

    <!-- Percentage symbol accent -->
    <text x="170" y="152" font-family="ui-sans-serif, system-ui, sans-serif"
          font-size="28" font-weight="700" fill="#059669" fill-opacity="0.1" text-anchor="middle">%</text>

    <!-- Mini bar chart accent (bottom-left of tag) -->
    <g transform="translate(88 138)">
      <rect x="0"  y="8"  width="6" height="8"  rx="1.5" fill="#059669" fill-opacity="0.3"/>
      <rect x="8"  y="4"  width="6" height="12" rx="1.5" fill="#059669" fill-opacity="0.4"/>
      <rect x="16" y="0"  width="6" height="16" rx="1.5" fill="#059669" fill-opacity="0.55"/>
    </g>
  </g>

  <!-- ── Floating coin / currency accent ── -->
  <g filter="url(#ep-coin-drop)" transform="translate(196 68)">
    <circle r="18" cx="0" cy="0" fill="url(#ep-coin)" stroke="#D97706" stroke-width="1.5"/>
    <!-- Coin rim -->
    <circle r="14" cx="0" cy="0" fill="none" stroke="#FDE68A" stroke-width="1" stroke-opacity="0.7"/>
    <!-- Currency symbol -->
    <text x="0" y="6" font-family="ui-sans-serif, system-ui, sans-serif"
          font-size="16" font-weight="700" fill="#D97706" text-anchor="middle">₫</text>
    <!-- Coin highlight -->
    <path d="M-10 -12 Q-2 -16 6 -12" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-opacity="0.5"/>
  </g>

  <!-- Small scattered coins -->
  <g opacity="0.55" transform="translate(54 60)">
    <circle r="9" cx="0" cy="0" fill="url(#ep-coin)" stroke="#D97706" stroke-width="1"/>
    <text x="0" y="3.5" font-family="ui-sans-serif, system-ui, sans-serif"
          font-size="8" font-weight="700" fill="#D97706" text-anchor="middle">₫</text>
  </g>
  <g opacity="0.35" transform="translate(36 84)">
    <circle r="6" cx="0" cy="0" fill="url(#ep-coin)" stroke="#D97706" stroke-width="0.8"/>
  </g>

  <!-- Sparkles -->
  <g stroke="#059669" stroke-width="1.8" stroke-linecap="round" opacity="0.5">
    <line x1="178" y1="44" x2="184" y2="50"/>
    <line x1="184" y1="44" x2="178" y2="50"/>
  </g>
  <g stroke="#D97706" stroke-width="1.4" stroke-linecap="round" opacity="0.4">
    <line x1="218" y1="94" x2="222" y2="98"/>
    <line x1="222" y1="94" x2="218" y2="98"/>
  </g>
  <circle cx="34"  cy="120" r="2"   fill="#059669" fill-opacity="0.18"/>
  <circle cx="210" cy="46"  r="1.5" fill="#D97706" fill-opacity="0.3"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <!-- Soft background ellipse -->
  <ellipse cx="120" cy="170" rx="70" ry="8" fill="#059669" fill-opacity="0.06"/>

  <!-- Back tag (faded) -->
  <g opacity="0.5">
    <path d="M70 70 L120 70 L160 110 L120 150 L70 150 Z" fill="#FAFAFA" stroke="#E4E4E7" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="86" cy="110" r="6" fill="#FFFFFF" stroke="#E4E4E7" stroke-width="2"/>
  </g>

  <!-- Front tag (brand) -->
  <path d="M82 60 L140 60 L186 106 L140 152 L82 152 Z"
        fill="#ECFDF5" stroke="#059669" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Tag highlight -->
  <path d="M86 64 L130 64" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-opacity="0.9"/>

  <!-- Tag hole -->
  <circle cx="100" cy="106" r="8" fill="#FFFFFF" stroke="#059669" stroke-width="2.5"/>
  <circle cx="100" cy="106" r="3" fill="#059669"/>

  <!-- Price text lines -->
  <rect x="118" y="92" width="48" height="6" rx="2" fill="#059669"/>
  <rect x="118" y="106" width="36" height="5" rx="1.5" fill="#059669" fill-opacity="0.5"/>
  <rect x="118" y="118" width="42" height="5" rx="1.5" fill="#059669" fill-opacity="0.5"/>

  <!-- Sparkle -->
  <g stroke="#059669" stroke-width="1.8" stroke-linecap="round" opacity="0.6">
    <line x1="172" y1="50" x2="178" y2="56"/>
    <line x1="178" y1="50" x2="172" y2="56"/>
  </g>
</svg>

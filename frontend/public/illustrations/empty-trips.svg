<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <!-- Soft background ellipse -->
  <ellipse cx="120" cy="160" rx="90" ry="10" fill="#059669" fill-opacity="0.08"/>

  <!-- Road lines -->
  <line x1="40" y1="150" x2="60" y2="150" stroke="#A1A1AA" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 6"/>
  <line x1="180" y1="150" x2="200" y2="150" stroke="#A1A1AA" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 6"/>

  <!-- Truck body (cargo box) -->
  <rect x="78" y="78" width="78" height="58" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="2.5"/>
  <!-- Cargo door lines -->
  <line x1="117" y1="86" x2="117" y2="128" stroke="#059669" stroke-width="1.5" stroke-opacity="0.5"/>
  <rect x="100" y="100" width="14" height="14" rx="1.5" fill="none" stroke="#059669" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="120" y="100" width="14" height="14" rx="1.5" fill="none" stroke="#059669" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Cab -->
  <path d="M156 96 L180 96 Q186 96 186 102 L186 136 L156 136 Z" fill="#059669"/>
  <!-- Cab window -->
  <path d="M160 100 L180 100 Q182 100 182 102 L182 116 L160 116 Z" fill="#FFFFFF" fill-opacity="0.92"/>
  <!-- Door handle -->
  <circle cx="161" cy="124" r="1.5" fill="#FFFFFF" fill-opacity="0.6"/>

  <!-- Wheels -->
  <circle cx="98" cy="142" r="10" fill="#18181B"/>
  <circle cx="98" cy="142" r="4" fill="#71717A"/>
  <circle cx="166" cy="142" r="10" fill="#18181B"/>
  <circle cx="166" cy="142" r="4" fill="#71717A"/>

  <!-- Smoke / motion puffs -->
  <circle cx="65" cy="98" r="6" fill="#E4E4E7" fill-opacity="0.7"/>
  <circle cx="55" cy="106" r="4" fill="#E4E4E7" fill-opacity="0.5"/>
  <circle cx="50" cy="116" r="3" fill="#E4E4E7" fill-opacity="0.35"/>

  <!-- Empty box symbol on cargo -->
  <circle cx="135" cy="64" r="14" fill="#FAFAFA" stroke="#E4E4E7" stroke-width="1.5"/>
  <path d="M129 60 L141 60 M129 64 L139 64 M129 68 L141 68" stroke="#A1A1AA" stroke-width="1.5" stroke-linecap="round"/>
</svg>

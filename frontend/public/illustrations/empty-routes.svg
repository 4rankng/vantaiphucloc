<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <!-- Soft background ellipse -->
  <ellipse cx="120" cy="172" rx="78" ry="9" fill="#059669" fill-opacity="0.06"/>

  <!-- Folded map paper background -->
  <path d="M40 56 L92 48 L148 60 L200 52 L200 152 L148 160 L92 148 L40 156 Z"
        fill="#FAFAFA" stroke="#E4E4E7" stroke-width="2" stroke-linejoin="round"/>

  <!-- Map fold creases -->
  <line x1="92" y1="48" x2="92" y2="148" stroke="#E4E4E7" stroke-width="1.5" stroke-dasharray="2 3"/>
  <line x1="148" y1="60" x2="148" y2="160" stroke="#E4E4E7" stroke-width="1.5" stroke-dasharray="2 3"/>

  <!-- Subtle grid hint (terrain blobs) -->
  <g opacity="0.7">
    <path d="M52 84 Q66 78 78 88 Q72 96 60 94 Z" fill="#ECFDF5"/>
    <path d="M156 110 Q172 104 184 116 Q176 124 162 122 Z" fill="#ECFDF5"/>
    <path d="M104 126 Q116 120 128 130 Q120 138 110 136 Z" fill="#ECFDF5"/>
  </g>

  <!-- Curved dashed route from pin A to pin B -->
  <path d="M70 122 C 96 80, 152 80, 178 76"
        stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="4 6" fill="none"/>

  <!-- Pin A (origin) -->
  <path d="M70 122 C 70 110, 80 102, 80 92 C 80 80, 70 74, 64 80 C 58 86, 60 96, 70 122 Z"
        fill="#059669" stroke="#047857" stroke-width="1.5" stroke-linejoin="round"/>
  <circle cx="70" cy="90" r="4.5" fill="#FFFFFF"/>

  <!-- Pin B (destination) -->
  <path d="M178 76 C 178 64, 188 56, 188 46 C 188 34, 178 28, 172 34 C 166 40, 168 50, 178 76 Z"
        fill="#FFFFFF" stroke="#059669" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="178" cy="44" r="4" fill="#059669"/>

  <!-- Compass rose detail (bottom-right) -->
  <g transform="translate(176 132)" opacity="0.85">
    <circle cx="0" cy="0" r="11" fill="#FFFFFF" stroke="#059669" stroke-width="1.8"/>
    <path d="M0 -8 L2.5 0 L0 8 L-2.5 0 Z" fill="#059669"/>
    <text x="0" y="-12.5" font-family="system-ui, sans-serif" font-size="6.5" font-weight="700"
          fill="#059669" text-anchor="middle">N</text>
  </g>

  <!-- Sparkle accents -->
  <g stroke="#059669" stroke-width="1.6" stroke-linecap="round" opacity="0.55">
    <line x1="48" y1="40" x2="54" y2="46"/>
    <line x1="54" y1="40" x2="48" y2="46"/>
  </g>
</svg>

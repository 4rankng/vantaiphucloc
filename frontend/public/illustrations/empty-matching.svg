  <rect x="50" y="72" width="32" height="6" rx="2" fill="#E4E4E7"/>
  <rect x="50" y="84" width="48" height="4" rx="1.5" fill="#F4F4F5"/>
  <rect x="50" y="94" width="40" height="4" rx="1.5" fill="#F4F4F5"/>

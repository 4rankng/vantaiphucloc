<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <defs>
    <linearGradient id="ee-plug-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#D1FAE5"/>
    </linearGradient>
    <linearGradient id="ee-plug-r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4F4F5"/>
      <stop offset="100%" stop-color="#E4E4E7"/>
    </linearGradient>
    <linearGradient id="ee-badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <linearGradient id="ee-cable-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="ee-cable-r" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A1A1AA" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#A1A1AA" stop-opacity="0.45"/>
    </linearGradient>
    <radialGradient id="ee-shadow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ee-spark-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FCD34D" stop-opacity="0"/>
    </radialGradient>
    <filter id="ee-drop-plug" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#059669" flood-opacity="0.14"/>
    </filter>
    <filter id="ee-drop-plug-r" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#09090B" flood-opacity="0.08"/>
    </filter>
    <filter id="ee-drop-badge" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#EF4444" flood-opacity="0.30"/>
    </filter>
    <filter id="ee-spark-blur" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="120" cy="172" rx="76" ry="8" fill="url(#ee-shadow)"/>

  <!-- ── Left cable (brand green, going to plug) ── -->
  <path d="M14 100 Q32 100 42 100" stroke="url(#ee-cable-l)" stroke-width="5" stroke-linecap="round"/>
  <!-- Cable sheath detail -->
  <path d="M14 100 Q32 100 42 100" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-opacity="0.4" stroke-dasharray="4 3"/>

  <!-- ── Right cable (zinc, going from plug) ── -->
  <path d="M198 100 Q188 100 178 100" stroke="url(#ee-cable-r)" stroke-width="5" stroke-linecap="round"/>
  <path d="M198 100 Q188 100 178 100" stroke="#A1A1AA" stroke-width="2" stroke-linecap="round" stroke-opacity="0.35" stroke-dasharray="4 3"/>

  <!-- ── Left plug (emerald branded, female) ── -->
  <g filter="url(#ee-drop-plug)">
    <!-- Body -->
    <rect x="28" y="72" width="44" height="56" rx="10" fill="url(#ee-plug-l)" stroke="#059669" stroke-width="1.8"/>
    <!-- Face plate (connector face) -->
    <rect x="66" y="80" width="10" height="40" rx="4" fill="#D1FAE5" stroke="#059669" stroke-width="1.2"/>
    <!-- Socket holes -->
    <rect x="68" y="88"  width="5" height="8" rx="2" fill="#059669" fill-opacity="0.3"/>
    <rect x="68" y="102" width="5" height="8" rx="2" fill="#059669" fill-opacity="0.3"/>
    <!-- Side ridges -->
    <line x1="34" y1="82" x2="34" y2="120" stroke="#059669" stroke-width="0.8" stroke-opacity="0.2"/>
    <line x1="40" y1="82" x2="40" y2="120" stroke="#059669" stroke-width="0.8" stroke-opacity="0.2"/>
    <!-- Top highlight -->
    <path d="M34 76 Q50 73 66 76" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-opacity="0.7"/>
    <!-- Brand stripe -->
    <rect x="28" y="92" width="4" height="16" rx="2" fill="#059669" fill-opacity="0.4"/>
    <!-- Label chip -->
    <rect x="35" y="108" width="26" height="8" rx="2.5" fill="#ECFDF5" stroke="#059669" stroke-width="0.8"/>
    <rect x="39" y="111" width="18" height="2.5" rx="1" fill="#059669" fill-opacity="0.4"/>
  </g>

  <!-- ── Right plug (neutral zinc, male) ── -->
  <g filter="url(#ee-drop-plug-r)">
    <!-- Body -->
    <rect x="168" y="72" width="44" height="56" rx="10" fill="url(#ee-plug-r)" stroke="#D4D4D8" stroke-width="1.8"/>
    <!-- Face plate -->
    <rect x="164" y="80" width="10" height="40" rx="4" fill="#E4E4E7" stroke="#D4D4D8" stroke-width="1.2"/>
    <!-- Pins -->
    <rect x="165" y="87"  width="5" height="9" rx="2" fill="#A1A1AA" fill-opacity="0.6"/>
    <rect x="165" y="103" width="5" height="9" rx="2" fill="#A1A1AA" fill-opacity="0.6"/>
    <!-- Side ridges -->
    <line x1="200" y1="82" x2="200" y2="120" stroke="#A1A1AA" stroke-width="0.8" stroke-opacity="0.3"/>
    <line x1="206" y1="82" x2="206" y2="120" stroke="#A1A1AA" stroke-width="0.8" stroke-opacity="0.3"/>
    <!-- Top highlight -->
    <path d="M174 76 Q190 73 206 76" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-opacity="0.7"/>
    <!-- Label chip -->
    <rect x="179" y="108" width="26" height="8" rx="2.5" fill="#F4F4F5" stroke="#E4E4E7" stroke-width="0.8"/>
    <rect x="183" y="111" width="18" height="2.5" rx="1" fill="#D4D4D8"/>
  </g>

  <!-- ── Disconnection gap — spark glow ── -->
  <ellipse cx="120" cy="100" rx="16" ry="14" fill="url(#ee-spark-glow)" filter="url(#ee-spark-blur)"/>

  <!-- Gap lines (open ends) -->
  <line x1="108" y1="94"  x2="112" y2="94"  stroke="#A1A1AA" stroke-width="2" stroke-linecap="round" stroke-opacity="0.4"/>
  <line x1="108" y1="100" x2="112" y2="100" stroke="#A1A1AA" stroke-width="2" stroke-linecap="round" stroke-opacity="0.4"/>
  <line x1="108" y1="106" x2="112" y2="106" stroke="#A1A1AA" stroke-width="2" stroke-linecap="round" stroke-opacity="0.4"/>

  <!-- Spark bolts at gap centre -->
  <g fill="#FCD34D" opacity="0.9">
    <!-- Main bolt -->
    <path d="M116 89 L112 99 L117 99 L113 111 L121 98 L116 98 Z"/>
    <!-- Small side bolt left -->
    <path d="M109 95 L107 101 L110 101 L108 107 L113 100 L110 100 Z" opacity="0.5"/>
    <!-- Small side bolt right -->
    <path d="M130 94 L128 99 L131 99 L129 105 L133 99 L130 99 Z" opacity="0.4"/>
  </g>
  <!-- Spark particles -->
  <circle cx="106" cy="88" r="2"   fill="#FCD34D" opacity="0.55"/>
  <circle cx="130" cy="90" r="1.5" fill="#FCD34D" opacity="0.45"/>
  <circle cx="132" cy="108" r="1.8" fill="#FCD34D" opacity="0.4"/>
  <circle cx="108" cy="112" r="1.2" fill="#FCD34D" opacity="0.5"/>

  <!-- ── Warning badge ── -->
  <g filter="url(#ee-drop-badge)" transform="translate(120 50)">
    <circle r="14" cx="0" cy="0" fill="url(#ee-badge)"/>
    <!-- Exclamation mark -->
    <rect x="-1.5" y="-7" width="3" height="9" rx="1.5" fill="#FFFFFF"/>
    <circle cx="0" cy="5" r="1.8" fill="#FFFFFF"/>
    <!-- Highlight arc -->
    <path d="M-9 -9 Q-3 -13 3 -10" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.4"/>
  </g>

  <!-- Floating error mini chips -->
  <g transform="translate(38 148)">
    <rect x="-20" y="-10" width="44" height="20" rx="7" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
    <circle cx="-10" cy="0" r="4" fill="#EF4444" fill-opacity="0.7"/>
    <rect x="-2" y="-3.5" width="20" height="4" rx="1.5" fill="#FCA5A5"/>
    <rect x="-2" y="2"   width="14" height="3"   rx="1.5" fill="#FEE2E2"/>
  </g>
  <g transform="translate(196 148)">
    <rect x="-18" y="-9" width="38" height="18" rx="6" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="0.8"/>
    <circle cx="-8" cy="0" r="3.5" fill="#EF4444" fill-opacity="0.6"/>
    <rect x="-1" y="-3" width="16" height="3.5" rx="1.5" fill="#FCA5A5"/>
    <rect x="-1" y="2"  width="10" height="2.5" rx="1"   fill="#FEE2E2"/>
  </g>

  <!-- Sparkles -->
  <g stroke="#059669" stroke-width="1.6" stroke-linecap="round" opacity="0.45">
    <line x1="32"  y1="44" x2="38" y2="50"/>
    <line x1="38"  y1="44" x2="32" y2="50"/>
  </g>
  <g stroke="#A1A1AA" stroke-width="1.4" stroke-linecap="round" opacity="0.4">
    <line x1="200" y1="44" x2="205" y2="49"/>
    <line x1="205" y1="44" x2="200" y2="49"/>
  </g>
  <circle cx="38"  cy="130" r="2"   fill="#059669" fill-opacity="0.15"/>
  <circle cx="204" cy="132" r="1.5" fill="#EF4444" fill-opacity="0.2"/>
  <circle cx="200" cy="56"  r="1.2" fill="#A1A1AA" fill-opacity="0.35"/>
</svg>

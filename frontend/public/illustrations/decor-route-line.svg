<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" fill="none" role="img" aria-label="">
  <defs>
    <linearGradient id="drl-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669" stop-opacity="0"/>
      <stop offset="12%" stop-color="#059669" stop-opacity="0.85"/>
      <stop offset="88%" stop-color="#059669" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="drl-pin" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </radialGradient>
    <filter id="drl-glow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Soft baseline -->
  <line x1="24" y1="92" x2="456" y2="92" stroke="#ECFDF5" stroke-width="1" stroke-dasharray="2 6"/>

  <!-- Animated route curve (drawn in on reveal) -->
  <path class="decor-path-draw"
        d="M 28 92 C 110 92, 130 38, 220 38 S 360 110, 452 60"
        stroke="url(#drl-fade)" stroke-width="2.4" stroke-linecap="round"
        pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"/>

  <!-- Origin pin -->
  <g class="decor-pop" style="--decor-delay:80ms" transform="translate(28 92)">
    <circle r="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.4"/>
    <circle r="4" fill="url(#drl-pin)"/>
  </g>

  <!-- Mid waypoint -->
  <g class="decor-pop" style="--decor-delay:280ms" transform="translate(220 38)">
    <circle r="7" fill="#FFFFFF" stroke="#059669" stroke-width="1.4"/>
    <circle r="3" fill="#059669"/>
  </g>

  <!-- Destination pin -->
  <g class="decor-pop" style="--decor-delay:520ms" transform="translate(452 60)">
    <path d="M0 -14 C 7 -14, 11 -8, 11 -3 C 11 5, 0 14, 0 14 C 0 14, -11 5, -11 -3 C -11 -8, -7 -14, 0 -14 Z"
          fill="url(#drl-pin)" filter="url(#drl-glow)"/>
    <circle r="3.6" cy="-2" fill="#ECFDF5"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" fill="none">
  <!-- Base / rails -->
  <line x1="10" y1="76" x2="110" y2="76" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>

  <!-- Left pillar -->
  <line x1="25" y1="76" x2="25" y2="16" stroke="#065F46" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left pillar foot brace -->
  <line x1="18" y1="76" x2="25" y2="60" stroke="#065F46" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right pillar -->
  <line x1="85" y1="76" x2="85" y2="16" stroke="#065F46" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right pillar foot brace -->
  <line x1="92" y1="76" x2="85" y2="60" stroke="#065F46" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Horizontal beam -->
  <line x1="10" y1="16" x2="110" y2="16" stroke="#00B14F" stroke-width="3" stroke-linecap="round"/>

  <!-- Boom (cantilever arm) -->
  <line x1="85" y1="16" x2="110" y2="8" stroke="#00B14F" stroke-width="2" stroke-linecap="round"/>
  <line x1="85" y1="16" x2="110" y2="16" stroke="#10B981" stroke-width="1" stroke-linecap="round"/>

  <!-- Trolley -->
  <rect x="53" y="13" width="8" height="6" rx="1" fill="#00B14F"/>

  <!-- Cable -->
  <line x1="57" y1="19" x2="57" y2="52" stroke="#065F46" stroke-width="1" stroke-dasharray="2 2"/>

  <!-- Hook -->
  <path d="M54 52 L60 52 L60 56 Q60 60 57 60 Q54 60 54 56 Z" fill="none" stroke="#065F46" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small container being lifted -->
  <rect x="48" y="60" width="18" height="10" rx="1" fill="#D1FAE5" stroke="#065F46" stroke-width="0.8"/>
  <line x1="54" y1="60" x2="54" y2="70" stroke="#065F46" stroke-opacity="0.2" stroke-width="0.5"/>
  <line x1="60" y1="60" x2="60" y2="70" stroke="#065F46" stroke-opacity="0.2" stroke-width="0.5"/>
</svg>

    </filter>
    <filter id="ew-drop-flag" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#059669" flood-opacity="0.2"></feDropShadow>
    </filter>
    <filter id="ew-drop-truck" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#059669" flood-opacity="0.18"></feDropShadow>
    </filter>
    <filter id="ew-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5"></feGaussianBlur>
    </filter>
  </defs>

  

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <defs>
    
    <linearGradient id="ew-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ECFDF5"></stop>
      <stop offset="100%" stop-color="#D1FAE5"></stop>
    </linearGradient>
    
    <linearGradient id="ew-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A7F3D0"></stop>
      <stop offset="100%" stop-color="#6EE7B7"></stop>
    </linearGradient>
    
    <linearGradient id="ew-road" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.1"></stop>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.22"></stop>
    </linearGradient>
    
    <linearGradient id="ew-cab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ECFDF5"></stop>
      <stop offset="100%" stop-color="#D1FAE5"></stop>
    </linearGradient>
    
    <linearGradient id="ew-trailer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"></stop>
      <stop offset="100%" stop-color="#E8FDF2"></stop>
    </linearGradient>
    
    <radialGradient id="ew-sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.22"></stop>
      <stop offset="60%" stop-color="#059669" stop-opacity="0.08"></stop>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"></stop>
    </radialGradient>
    
    <radialGradient id="ew-shadow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.1"></stop>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"></stop>
    </radialGradient>
    
    <linearGradient id="ew-flag" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"></stop>
      <stop offset="100%" stop-color="#34D399"></stop>
    </linearGradient>
    
    <linearGradient id="ew-ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.9"></stop>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.6"></stop>
    </linearGradient>
    
    <filter id="ew-drop" x="-20%" y="-20%" width="140%" height="140%">

<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<style>
.lucide-grid { display:grid; grid-template-columns: repeat(8, 1fr); gap: 14px 12px; }
.li { display:flex; flex-direction:column; align-items:center; gap: 6px; color: var(--fg-1); }
.li svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.li .nm { font-family: var(--font-mono); font-size: 9px; color: var(--fg-3); }
</style></head>
<body class="card">
  <p class="typo-eyebrow" style="margin:0 0 12px">Lucide-react — the working UI set · stroke 1.8 · 14–22 px</p>
  <div class="lucide-grid">
    <div class="li"><svg viewBox="0 0 24 24"><path d="M3 17h13M3 17V8a2 2 0 012-2h8v11M16 17h2.5a1.5 1.5 0 001.5-1.5V11l-3-3h-1"/><circle cx="6.5" cy="17.5" r="1.5"/><circle cx="17.5" cy="17.5" r="1.5"/></svg><span class="nm">truck</span></div>
    <div class="li"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg><span class="nm">search</span></div>
    <div class="li"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span class="nm">plus</span></div>
    <div class="li"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg><span class="nm">lock</span></div>
    <div class="li"><svg viewBox="0 0 24 24"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg><span class="nm">eye</span></div>
    <div class="li"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span class="nm">alert-circle</span></div>
    <div class="li"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/></svg><span class="nm">calendar</span></div>
    <div class="li"><svg viewBox="0 0 24 24"><line x1="12" y1="3" x2="12" y2="21"/><path d="M16 7H10a3 3 0 100 6h4a3 3 0 110 6H7"/></svg><span class="nm">dollar-sign</span></div>
    <div class="li"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0116 0"/></svg><span class="nm">user</span></div>
    <div class="li"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span class="nm">log-out</span></div>
    <div class="li"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg><span class="nm">chevron-r</span></div>
    <div class="li"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg><span class="nm">chevron-d</span></div>
    <div class="li"><svg viewBox="0 0 24 24"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg><span class="nm">trending</span></div>
    <div class="li"><svg viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg><span class="nm">arrow-ur</span></div>
    <div class="li"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span class="nm">activity</span></div>
    <div class="li"><svg viewBox="0 0 24 24"><circle cx="8" cy="14" r="4"/><path d="M11 11l8-8"/><path d="M15 7l3 3"/></svg><span class="nm">key-round</span></div>
  </div>
</body></html>

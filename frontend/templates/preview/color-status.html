<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.stat { flex:1; border:1px solid var(--border-1); border-radius: var(--radius-md); padding: 12px; background: var(--bg-2); }
.stat .chip { display:inline-flex; align-items:center; gap:6px; padding: 3px 8px; border-radius: var(--radius-full); font-size: 11px; font-weight: 700; }
.stat .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-top: 10px; }
.stat .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
.stat .role { font-size: 11px; color: var(--fg-2); margin-top: 4px; line-height: 1.35; }
.dot { width: 6px; height: 6px; border-radius: 50%; }
</style></head>
<body class="card">
  <p class="typo-eyebrow" style="margin:0 0 12px">Semantic status — pill + dot + soft surface</p>
  <div class="row" style="gap:12px">
    <div class="stat">
      <span class="chip" style="background:var(--success-soft);color:var(--success-text)"><span class="dot" style="background:var(--success)"></span> Đã khớp</span>
      <div class="name">--success</div>
      <div class="hex">#059669 / #ECFDF5</div>
    </div>
    <div class="stat">
      <span class="chip" style="background:var(--warning-soft);color:var(--warning-text)"><span class="dot" style="background:var(--warning)"></span> Chờ xử lý</span>
      <div class="name">--warning</div>
      <div class="hex">#D97706 / #FFFBEB</div>
    </div>
    <div class="stat">
      <span class="chip" style="background:var(--danger-soft);color:var(--danger-text)"><span class="dot" style="background:var(--danger)"></span> Đã huỷ</span>
      <div class="name">--danger</div>
      <div class="hex">#DC2626 / #FEF2F2</div>
    </div>
    <div class="stat">
      <span class="chip" style="background:var(--info-soft);color:var(--info-text)"><span class="dot" style="background:var(--info)"></span> Doanh nghiệp</span>
      <div class="name">--info</div>
      <div class="hex">#2563EB / #EFF6FF</div>
    </div>
  </div>
</body></html>

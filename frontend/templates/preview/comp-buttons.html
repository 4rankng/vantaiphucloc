<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<link rel="stylesheet" href="_components.css">
<style>
.section { margin-bottom: 18px; }
.section:last-child { margin-bottom: 0; }
.lbl { font-size: 10px; font-weight: 700; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
.bar { display:flex; flex-wrap:wrap; gap: 8px; align-items: center; }
.divider { height: 1px; background: var(--border-2); margin: 0; }
.kbd { font-family: var(--font-mono); font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 4px; background: var(--bg-3); border: 1px solid var(--border-1); color: var(--fg-3); }
</style></head>
<body class="card">
  <div class="section">
    <div class="lbl">Variants \u00b7 36px default</div>
    <div class="bar">
      <button class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Tạo lệnh
      </button>
      <button class="btn btn-secondary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        Bộ lọc
      </button>
      <button class="btn btn-outline">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Xuất Excel
      </button>
      <button class="btn btn-ghost">Huỷ</button>
      <button class="btn btn-destructive">Đăng xuất</button>
    </div>
  </div>

  <div class="section">
    <div class="lbl">Sizes \u00b7 30 / 36 / 40</div>
    <div class="bar">
      <button class="btn btn-primary btn-sm">Bắt đầu</button>
      <button class="btn btn-primary">Hoàn thành chuyến</button>
      <button class="btn btn-primary btn-lg">Xác nhận lệnh vận chuyển</button>
      <button class="btn btn-secondary btn-sm">Sửa</button>
      <button class="btn btn-secondary">Lưu nháp</button>
    </div>
  </div>

  <div class="section">
    <div class="lbl">States</div>
    <div class="bar">
      <button class="btn btn-primary">Mặc định</button>
      <button class="btn btn-primary" style="background:linear-gradient(180deg,#0A8E66 0%,#04875F 100%);" title="hover">Hover</button>
      <button class="btn btn-primary" style="background:#047857;box-shadow:inset 0 1px 2px rgba(0,0,0,0.18);" title="pressed">Pressed</button>
      <button class="btn btn-primary" style="box-shadow:0 0 0 2px var(--bg-2),0 0 0 4px color-mix(in srgb,var(--brand-2) 75%,transparent),inset 0 1px 0 rgba(255,255,255,0.12),0 1px 2px rgba(4,120,87,0.25);" title="focus">Focus</button>
      <button class="btn btn-primary" disabled>Đang lưu…</button>
      <button class="btn btn-primary btn-loading">Đang xử lý</button>
    </div>
  </div>

  <div class="section">
    <div class="lbl">Icon-only \u00b7 with shortcut hint</div>
    <div class="bar">
      <button class="btn btn-secondary btn-icon" aria-label="Tìm">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
      </button>
      <button class="btn btn-secondary btn-icon" aria-label="Thông báo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      </button>
      <button class="btn btn-secondary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
        Tìm khách hàng
        <span class="kbd">⌘K</span>
      </button>
    </div>
  </div>
</body></html>

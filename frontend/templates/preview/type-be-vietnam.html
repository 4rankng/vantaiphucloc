<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.spec { font-family: var(--font-display); font-size: 56px; font-weight: 700; letter-spacing: -0.025em; line-height: 1; color: var(--fg-1); }
.spec small { display:block; font-family: var(--font-sans); font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-3); margin-top: 12px; line-height: 1.3; }
.diacritic { font-family: var(--font-display); font-size: 48px; font-weight: 600; line-height: 1.1; color: var(--fg-1); letter-spacing: -0.01em; }
</style>
</head>
<body class="card">
  <div class="row" style="gap:32px;align-items:flex-end">
    <div>
      <div class="spec">Aa
        <small>Be Vietnam Pro<br>300 · 400 · 500 · 600 · 700 · 800</small>
      </div>
    </div>
    <div style="flex:1;border-left:1px solid var(--border-1);padding-left:24px">
      <p class="diacritic" style="margin:0">Đ ấ ệ ự ố ằ ợ</p>
      <p class="typo-caption" style="margin:8px 0 0;line-height:1.5">Combining diacritics — never tighten below <span class="typo-mono" style="font-size:12px">-0.025em</span>.
      Six weights loaded plus italic-400; substitutions break Vietnamese typography.</p>
    </div>
  </div>
</body></html>

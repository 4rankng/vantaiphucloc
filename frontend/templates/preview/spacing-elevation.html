<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
body { background: var(--bg-1); }
.elev { flex:1; background: var(--bg-2); border-radius: var(--radius-lg); padding: 16px; min-height: 100px; display:flex; flex-direction:column; justify-content:space-between; }
.elev .name { font-family: var(--font-mono); font-size: 12px; color: var(--fg-1); font-weight: 700; }
.elev .role { font-size: 11px; color: var(--fg-2); line-height: 1.4; margin-top: 4px; }
.elev .val { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-top: 8px; }
</style></head>
<body class="card">
  <p class="typo-eyebrow" style="margin:0 0 12px">Elevation — always paired with 1px hairline</p>
  <div class="row" style="gap:14px">
    <div class="elev" style="border:1px solid var(--border-1); box-shadow: var(--shadow-sm)">
      <div><div class="name">sm</div><div class="role">Passive listing cards</div></div>
      <div class="val">0 1px 1px 0 rgba(9,9,11,.03)</div>
    </div>
    <div class="elev" style="border:1px solid var(--border-1); box-shadow: var(--shadow-card)">
      <div><div class="name">card</div><div class="role">KPI tiles, default cards</div></div>
      <div class="val">0 1px 2px 0 rgba(9,9,11,.04)</div>
    </div>
    <div class="elev" style="box-shadow: var(--shadow-elevated)">
      <div><div class="name">elevated</div><div class="role">Popovers, dropdowns, modals</div></div>
      <div class="val">0 4px 16px −4px rgba(9,9,11,.08) + inner ring</div>
    </div>
  </div>
</body></html>

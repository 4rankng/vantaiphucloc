<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.ease-row { display:flex; align-items:center; gap:14px; padding:10px 0; border-top:1px solid var(--border-2); }
.ease-row:first-of-type { border-top: none; }
.swatch { width: 28px; height: 28px; border-radius: var(--radius-md); background: var(--brand); animation: hop 2.4s infinite; }
.swatch.fast    { animation-duration: 0.5s; animation-timing-function: cubic-bezier(0.4,0,0.2,1); }
.swatch.normal  { animation-duration: 0.7s; animation-timing-function: cubic-bezier(0.4,0,0.2,1); }
.swatch.slow    { animation-duration: 1.0s; animation-timing-function: cubic-bezier(0.4,0,0.2,1); }
.swatch.spring  { animation-duration: 1.0s; animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); }
@keyframes hop {
  0%, 100% { transform: translateX(0); }
  50% { transform: translateX(280px); }
}
.name { font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--fg-1); width: 70px; }
.val { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
.role { font-size: 12px; color: var(--fg-2); margin-left: auto; }
.track { flex: 1; height: 28px; position: relative; }
</style></head>
<body class="card">
  <p class="typo-eyebrow" style="margin:0 0 8px">Motion · ease &amp; durations</p>
  <div class="ease-row"><div class="name">fast</div><div class="val">120ms</div><div class="track"><div class="swatch fast" style="position:absolute;left:0"></div></div><div class="role">Hover, toggle</div></div>
  <div class="ease-row"><div class="name">normal</div><div class="val">180ms</div><div class="track"><div class="swatch normal" style="position:absolute;left:0"></div></div><div class="role">Default transition</div></div>
  <div class="ease-row"><div class="name">slow</div><div class="val">240ms</div><div class="track"><div class="swatch slow" style="position:absolute;left:0"></div></div><div class="role">Modal / sheet</div></div>
  <div class="ease-row"><div class="name">spring</div><div class="val">300ms</div><div class="track"><div class="swatch spring" style="position:absolute;left:0"></div></div><div class="role">Confirm pop, FAB</div></div>
</body></html>

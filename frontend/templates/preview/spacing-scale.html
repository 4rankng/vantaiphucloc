<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.scale { display:flex; flex-direction:column; gap: 10px; }
.row-i { display:flex; align-items:center; gap:14px; }
.bar { background: var(--brand-soft); height: 14px; border-radius: 3px; border:1px solid color-mix(in srgb, var(--brand) 30%, transparent); }
.label { width: 70px; font-family: var(--font-mono); font-size: 12px; color: var(--fg-1); font-weight: 600; }
.value { width: 50px; font-family: var(--font-mono); font-size: 12px; color: var(--fg-3); font-variant-numeric: tabular-nums; }
.role { font-size: 12px; color: var(--fg-2); }
</style></head>
<body class="card">
  <p class="typo-eyebrow" style="margin:0 0 12px">Spacing scale — 4px base</p>
  <div class="scale">
    <div class="row-i"><div class="label">xs</div><div class="value">4px</div><div class="bar" style="width:4px"></div><div class="role">Icon-to-text gap, tight</div></div>
    <div class="row-i"><div class="label">sm</div><div class="value">8px</div><div class="bar" style="width:8px"></div><div class="role">Field label-to-input</div></div>
    <div class="row-i"><div class="label">md</div><div class="value">12px</div><div class="bar" style="width:12px"></div><div class="role">Inline group gap</div></div>
    <div class="row-i"><div class="label">lg</div><div class="value">16px</div><div class="bar" style="width:16px"></div><div class="role">Card padding, section gap</div></div>
    <div class="row-i"><div class="label">xl</div><div class="value">24px</div><div class="bar" style="width:24px"></div><div class="role">Stat-grid gap (≥lg)</div></div>
    <div class="row-i"><div class="label">2xl</div><div class="value">32px</div><div class="bar" style="width:32px"></div><div class="role">Page section break</div></div>
    <div class="row-i"><div class="label">3xl</div><div class="value">48px</div><div class="bar" style="width:48px"></div><div class="role">Hero / major divider</div></div>
  </div>
</body></html>

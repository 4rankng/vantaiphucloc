<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<style>
.grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px 14px; }
.cell { display:flex; flex-direction:column; align-items:center; gap: 6px; }
.cell img { width: 64px; height: 64px; object-fit: contain; }
.cell .nm { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); font-weight: 600; text-align: center; }
</style></head>
<body class="card">
  <p class="typo-eyebrow" style="margin:0 0 12px">Branded 3D icons — hero/role/empty surfaces only · never inline</p>
  <div class="grid">
    <div class="cell"><img src="../assets/icons/icon_truck.png" alt=""><div class="nm">truck</div></div>
    <div class="cell"><img src="../assets/icons/icon_route.png" alt=""><div class="nm">route</div></div>
    <div class="cell"><img src="../assets/icons/icon_package.png" alt=""><div class="nm">package</div></div>
    <div class="cell"><img src="../assets/icons/icon_warehouse.png" alt=""><div class="nm">warehouse</div></div>
    <div class="cell"><img src="../assets/icons/icon_invoice.png" alt=""><div class="nm">invoice</div></div>
    <div class="cell"><img src="../assets/icons/icon_document.png" alt=""><div class="nm">document</div></div>
    <div class="cell"><img src="../assets/icons/icon_schedule.png" alt=""><div class="nm">schedule</div></div>
    <div class="cell"><img src="../assets/icons/icon_analytics.png" alt=""><div class="nm">analytics</div></div>
    <div class="cell"><img src="../assets/icons/icon_team.png" alt=""><div class="nm">team</div></div>
    <div class="cell"><img src="../assets/icons/icon_settings.png" alt=""><div class="nm">settings</div></div>
    <div class="cell"><img src="../assets/icons/money.png" alt=""><div class="nm">money</div></div>
    <div class="cell"><img src="../assets/icons/calkey.png" alt=""><div class="nm">calkey</div></div>
  </div>
</body></html>

<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.swatch { flex:1; }
.swatch .chip { height: 72px; border-radius: var(--radius-md); border: 1px solid var(--border-1); }
.swatch .name { font-size: 13px; font-weight: 600; margin-top: 10px; }
.swatch .hex { font-family: var(--font-mono); font-size: 12px; color: var(--fg-3); margin-top: 2px; font-variant-numeric: tabular-nums; }
.swatch .role { font-size: 12px; color: var(--fg-2); margin-top: 4px; line-height: 1.4; }
</style></head>
<body class="card">
  <p class="typo-eyebrow" style="margin:0 0 12px">Backgrounds &amp; borders</p>
  <div class="row" style="gap:14px">
    <div class="swatch">
      <div class="chip" style="background:var(--bg-1)"></div>
      <div class="name">--bg-1</div>
      <div class="hex">#FAFAFA</div>
      <div class="role">Page canvas</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:var(--bg-2)"></div>
      <div class="name">--bg-2</div>
      <div class="hex">#FFFFFF</div>
      <div class="role">Cards, sheets, dialogs</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:var(--bg-3)"></div>
      <div class="name">--bg-3</div>
      <div class="hex">#F4F4F5</div>
      <div class="role">Hover row, input, chip</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:var(--bg-2);border:1px solid var(--border-1);position:relative">
        <div style="position:absolute;inset:14px;border:1px solid var(--border-1);border-radius:6px"></div>
      </div>
      <div class="name">--border-1</div>
      <div class="hex">#E4E4E7</div>
      <div class="role">Default 1px hairline</div>
    </div>
  </div>
</body></html>

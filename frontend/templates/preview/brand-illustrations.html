<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<style>
.empty-grid { display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.cell { background: var(--bg-2); border: 1px solid var(--border-1); border-radius: var(--radius-lg); padding: 14px; display:flex; flex-direction:column; align-items:center; gap: 8px; }
.cell img { width: 130px; height: 110px; object-fit: contain; }
.cell .nm { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style></head>
<body class="card">
  <p class="typo-eyebrow" style="margin:0 0 12px">Empty-state illustrations — emerald palette · use at 120–240 px</p>
  <div class="empty-grid">
    <div class="cell"><img src="../assets/illustrations/empty-trips.svg" alt=""><div class="nm">empty-trips</div></div>
    <div class="cell"><img src="../assets/illustrations/empty-clients.svg" alt=""><div class="nm">empty-clients</div></div>
    <div class="cell"><img src="../assets/illustrations/empty-welcome.svg" alt=""><div class="nm">empty-welcome</div></div>
    <div class="cell"><img src="../assets/illustrations/empty-search.svg" alt=""><div class="nm">empty-search</div></div>
    <div class="cell"><img src="../assets/illustrations/empty-routes.svg" alt=""><div class="nm">empty-routes</div></div>
    <div class="cell"><img src="../assets/illustrations/empty-error.svg" alt=""><div class="nm">empty-error</div></div>
  </div>
</body></html>

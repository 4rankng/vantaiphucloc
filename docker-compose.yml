# ── TTransport (Vận Tải Hàng Hóa) ──────────────────────────────────────────────
# Services: PostgreSQL (external) · Redis 7 · FastAPI Backend · ARQ Worker · React Frontend · Adminer
#
# Quick start:
#   cp backend/.env.example backend/.env   # fill in secrets
#   docker compose up -d
#   open http://localhost:3000
#
# Environment variables (see backend/.env):
#   DATABASE_URL, SECRET_KEY, CORS_ORIGINS, REDIS_URL
#   GEMINI_API_KEY, GEMINI_MODEL

services:

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vantai_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "${REDIS_HOST_PORT:-6381}:6379"
    volumes:
      - redis_data:/data
    networks:
      - vantai_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API (FastAPI) ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vantai_backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - backend/.env
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@host.docker.internal:5432/vantaihanghoa
    ports:
      - "${API_HOST_PORT:-8100}:8000"
    volumes:
      - ./data/photos:/opt/vantaiphucloc/data/photos
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - vantai_network

  # ── Background Worker (ARQ) ──────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vantai_worker
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - backend/.env
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./data/photos:/opt/vantaiphucloc/data/photos
    command: ["arq", "app.workers.worker.WorkerSettings"]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - vantai_network

  # ── Frontend (React + Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vantai_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3080}:80"
    depends_on:
      - backend
    networks:
      - vantai_network

  # ── Adminer (DB UI — dev only) ───────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: vantai_adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_HOST_PORT:-8083}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: host.docker.internal
      ADMINER_DESIGN: pepa-linha
    profiles:
      - dev
    networks:
      - vantai_network

volumes:
  redis_data:

networks:
  vantai_network:
    driver: bridge


<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
<div style="min-height:560px;display:flex;align-items:center;justify-content:center;padding:2rem;font-family:'Be Vietnam Pro',sans-serif;">
<div id="dialog" style="width:100%;max-width:400px;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.12);">

  <div style="background:#0f4c2a;padding:24px 24px 28px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <span style="font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:.1em;text-transform:uppercase;font-weight:500;">Chi tiết tuyến</span>
        <div style="margin-top:6px;display:flex;align-items:center;gap:10px;">
          <span style="font-size:22px;font-weight:600;color:#fff;">Cát Lái</span>
          <svg width="32" height="10" viewBox="0 0 32 10"><line x1="0" y1="5" x2="24" y2="5" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-dasharray="3 3"/><polygon points="24,0 32,5 24,10" fill="rgba(255,255,255,0.6)"/></svg>
          <span style="font-size:22px;font-weight:600;color:#fff;">Q.12</span>
        </div>
      </div>
      <button onclick="document.getElementById('dialog').style.opacity='0'" style="background:rgba(255,255,255,0.1);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 1l12 12M13 1L1 13" stroke="rgba(255,255,255,0.8)" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div style="margin-top:20px;display:flex;gap:0;position:relative;">
      <div style="flex:1;">
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:4px;">
          <div style="width:8px;height:8px;border-radius:50%;background:#6ee7b7;flex-shrink:0;"></div>
          <span style="font-size:10px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:.08em;font-weight:500;">Điểm lấy</span>
        </div>
        <p style="margin:0;font-size:13px;font-weight:600;color:#fff;padding-left:15px;">ICD Cát Lái</p>
      </div>
      <div style="width:1px;background:rgba(255,255,255,0.12);margin:0 16px;"></div>
      <div style="flex:1;">
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:4px;">
          <div style="width:8px;height:8px;border-radius:50%;background:#fbbf24;flex-shrink:0;"></div>
          <span style="font-size:10px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:.08em;font-weight:500;">Điểm trả</span>
        </div>
        <p style="margin:0;font-size:13px;font-weight:600;color:#fff;padding-left:15px;">KCN Lê Minh Xuân, Q.12</p>
      </div>
    </div>
  </div>

  <div style="padding:20px 24px 0;">
    <p style="font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:.09em;font-weight:500;margin:0 0 12px;">Giá cước</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div style="background:#f8faf9;border:1px solid #e5e7eb;border-radius:12px;padding:14px 16px;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="4" width="14" height="8" rx="2" stroke="#6b7280" stroke-width="1.3"/><path d="M4 4V3a1 1 0 011-1h6a1 1 0 011 1v1" stroke="#6b7280" stroke-width="1.3"/></svg>
          <span style="font-size:11px;font-weight:600;color:#6b7280;">Container 20ft</span>
        </div>
        <p style="margin:0;font-size:20px;font-weight:600;color:#111827;">750<span style="font-size:13px;color:#6b7280;font-weight:500;">.000 đ</span></p>
      </div>
      <div style="background:#f8faf9;border:1px solid #e5e7eb;border-radius:12px;padding:14px 16px;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="4" width="14" height="8" rx="2" stroke="#6b7280" stroke-width="1.3"/><path d="M4 4V3a1 1 0 011-1h6a1 1 0 011 1v1" stroke="#6b7280" stroke-width="1.3"/></svg>
          <span style="font-size:11px;font-weight:600;color:#6b7280;">Container 40ft</span>
        </div>
        <p style="margin:0;font-size:20px;font-weight:600;color:#111827;">950<span style="font-size:13px;color:#6b7280;font-weight:500;">.000 đ</span></p>
      </div>
    </div>
  </div>

  <div style="padding:14px 24px 0;">
    <div style="display:flex;align-items:center;justify-content:space-between;background:#f8faf9;border:1px solid #e5e7eb;border-radius:12px;padding:13px 16px;">
      <span style="font-size:13px;font-weight:500;color:#374151;">Hai chiều</span>
      <span style="background:#fee2e2;color:#dc2626;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;">Không</span>
    </div>
  </div>

  <div style="padding:20px 24px 24px;display:grid;grid-template-columns:1fr 1.6fr;gap:10px;">
    <button style="padding:13px 0;border-radius:12px;border:1.5px solid #fecaca;background:#fff;color:#dc2626;font-size:14px;font-weight:600;cursor:pointer;font-family:'Be Vietnam Pro',sans-serif;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .15s;" onmouseover="this.style.background='#fef2f2'" onmouseout="this.style.background='#fff'">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M5.5 4V3a.5.5 0 01.5-.5h3a.5.5 0 01.5.5v1M3 4l.8 9a1 1 0 001 .9h6.4a1 1 0 001-.9L13 4" stroke="#dc2626" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Xoá
    </button>
    <button style="padding:13px 0;border-radius:12px;border:none;background:#16a34a;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Be Vietnam Pro',sans-serif;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .15s;" onmouseover="this.style.background='#15803d'" onmouseout="this.style.background='#16a34a'">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M11.5 2.5a1.41 1.41 0 012 2L5 13H3v-2L11.5 2.5z" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Chỉnh sửa
    </button>
  </div>

</div>
</div>

<div style="min-height: 520px; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; border-radius: var(--border-radius-lg); padding: 1.5rem;">
<div style="background: var(--color-background-primary); border-radius: var(--border-radius-xl); border: 0.5px solid var(--color-border-secondary); width: 100%; max-width: 480px; overflow: hidden;">

  <div style="padding: 1.25rem 1.5rem 1rem; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;">
    <div>
      <p style="font-size: 11px; color: var(--color-text-tertiary); margin: 0 0 4px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500;">Tuyến</p>
      <div style="display: flex; align-items: center; gap: 10px;">
        <span style="font-size: 20px; font-weight: 500; color: var(--color-text-primary);">Cát Lái</span>
        <svg width="28" height="12" viewBox="0 0 28 12" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="0" y1="6" x2="20" y2="6" stroke="var(--color-text-tertiary)" stroke-width="1.5" stroke-dasharray="3 2"/>
          <path d="M21 2L27 6L21 10" stroke="var(--color-text-secondary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span style="font-size: 20px; font-weight: 500; color: var(--color-text-primary);">Q.12</span>
      </div>
    </div>
    <button onclick="" style="background: none; border: none; cursor: pointer; padding: 4px; color: var(--color-text-tertiary); display: flex; align-items: center; justify-content: center; border-radius: var(--border-radius-md);" onmouseover="this.style.color='var(--color-text-secondary)'; this.style.background='var(--color-background-secondary)'" onmouseout="this.style.color='var(--color-text-tertiary)'; this.style.background='none'">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 4L14 14M14 4L4 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>

  <div style="padding: 1rem 1.5rem;">

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; margin-bottom: 12px;">
      <div style="padding: 14px 16px; border-right: 0.5px solid var(--color-border-tertiary);">
        <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 6px;">
          <div style="width: 6px; height: 6px; border-radius: 50%; background: var(--color-background-info); border: 1.5px solid var(--color-text-info);"></div>
          <p style="font-size: 11px; color: var(--color-text-tertiary); margin: 0; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500;">Điểm lấy</p>
        </div>
        <p style="font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin: 0; line-height: 1.4;">ICD Cát Lái</p>
      </div>
      <div style="padding: 14px 16px;">
        <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 6px;">
          <div style="width: 6px; height: 6px; border-radius: 50%; background: var(--color-background-success); border: 1.5px solid var(--color-text-success);"></div>
          <p style="font-size: 11px; color: var(--color-text-tertiary); margin: 0; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500;">Điểm trả</p>
        </div>
        <p style="font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin: 0; line-height: 1.4;">KCN Lê Minh Xuân, Q.12</p>
      </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 1rem;">
      <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px;">
        <p style="font-size: 11px; color: var(--color-text-tertiary); margin: 0 0 4px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500;">Giá 20ft</p>
        <p style="font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin: 0;">750.000 <span style="font-size: 11px; color: var(--color-text-secondary);">đ</span></p>
      </div>
      <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px;">
        <p style="font-size: 11px; color: var(--color-text-tertiary); margin: 0 0 4px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500;">Giá 40ft</p>
        <p style="font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin: 0;">950.000 <span style="font-size: 11px; color: var(--color-text-secondary);">đ</span></p>
      </div>
      <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px;">
        <p style="font-size: 11px; color: var(--color-text-tertiary); margin: 0 0 4px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500;">Hai chiều</p>
        <div style="display: inline-flex; align-items: center; gap: 4px; background: var(--color-background-danger); border-radius: 4px; padding: 2px 7px; margin-top: 2px;">
          <span style="font-size: 12px; font-weight: 500; color: var(--color-text-danger);">Không</span>
        </div>
      </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding-top: 4px;">
      <button style="display: flex; align-items: center; justify-content: center; gap: 7px; padding: 11px 0; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-danger); background: none; cursor: pointer; color: var(--color-text-danger); font-size: 14px; font-weight: 500;" onmouseover="this.style.background='var(--color-background-danger)'" onmouseout="this.style.background='none'">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M5.5 4V2.5a.5.5 0 01.5-.5h3a.5.5 0 01.5.5V4M6.5 7v4.5M9.5 7v4.5M3 4l.8 9a1 1 0 001 .9h6.4a1 1 0 001-.9L13 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Xoá
      </button>
      <button style="display: flex; align-items: center; justify-content: center; gap: 7px; padding: 11px 0; border-radius: var(--border-radius-md); border: none; background: var(--color-text-success); cursor: pointer; color: #fff; font-size: 14px; font-weight: 500;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M11.5 2.5a1.41 1.41 0 012 2L5 13H3v-2L11.5 2.5z" stroke="white" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Sửa
      </button>
    </div>

  </div>
</div>
</div>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEPO — Chi tiết chuyến</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand: #005A2D;
    --brand-dim: #00753C;
    --brand-soft: #E6F2EB;
    --brand-softer: #F0F7F3;
    --ink: #0F1714;
    --text: #0F1714;
    --text-2: #5B6661;
    --text-3: #8A938F;
    --bg: #F4F6F4;
    --card: #FFFFFF;
    --line: #ECEFEC;
    --line-2: #E2E6E3;
    --amber: #B6701A;
    --amber-bg: #FFF1DC;
    --danger: #C0392B;
    --danger-bg: #FDECEA;
    --shadow-sm: 0 1px 2px rgba(15, 23, 20, 0.04);
    --shadow-md: 0 4px 16px rgba(15, 23, 20, 0.06);
    --shadow-hero: 0 10px 28px rgba(0, 90, 45, 0.08);
    --shadow-cta: 0 8px 20px rgba(0, 90, 45, 0.28);
  }

  html, body {
    background: var(--bg);
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .phone {
    max-width: 447px;
    margin: 0 auto;
    background: var(--bg);
    min-height: 100vh;
  }

  /* ============ TOPBAR (unchanged) ============ */
  .topbar {
    background: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 40px; height: 40px;
    background: var(--brand);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
  }
  .greeting { font-size: 11px; color: var(--text-3); font-weight: 500; line-height: 1.2; }
  .name { font-size: 15px; font-weight: 700; color: var(--brand); line-height: 1.2; margin-top: 2px; }
  .topbar-right { display: flex; gap: 10px; }
  .icon-btn {
    width: 38px; height: 38px;
    background: var(--brand-soft);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--brand);
    cursor: pointer;
  }

  /* ============ BACK NAV ============ */
  .nav-back {
    padding: 18px 20px 8px;
    display: flex; align-items: center; gap: 8px;
    color: var(--brand);
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
  }
  .nav-back svg { transition: transform 0.2s; }
  .nav-back:hover svg { transform: translateX(-2px); }

  /* ============ HERO CONTAINER CARD (light) ============ */
  .hero {
    margin: 8px 16px 18px;
    background:
      radial-gradient(circle at 92% -10%, rgba(0, 90, 45, 0.08) 0%, transparent 45%),
      linear-gradient(180deg, #FFFFFF 0%, var(--brand-softer) 100%);
    border-radius: 20px;
    padding: 18px 20px 20px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-hero);
    border: 1px solid var(--line);
  }
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(0, 90, 45, 0.06) 1px, transparent 0);
    background-size: 16px 16px;
    background-position: 0 0;
    -webkit-mask-image: linear-gradient(to left, black, transparent 60%);
    mask-image: linear-gradient(to left, black, transparent 60%);
    pointer-events: none;
  }
  .hero-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    position: relative;
    z-index: 1;
  }
  .hero-label {
    font-size: 10.5px;
    letter-spacing: 1.6px;
    font-weight: 700;
    color: var(--text-3);
    text-transform: uppercase;
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--amber-bg);
    color: var(--amber);
    padding: 6px 11px 6px 9px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--amber);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(182, 112, 26, 0.5); }
    50% { opacity: 0.9; box-shadow: 0 0 0 6px rgba(182, 112, 26, 0); }
  }

  .container-no {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.5px;
    line-height: 1;
    position: relative;
    z-index: 1;
  }
  .hero-bottom {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    z-index: 1;
  }
  .type-chip {
    background: var(--brand-soft);
    color: var(--brand);
    padding: 5px 10px;
    border-radius: 7px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    font-family: 'JetBrains Mono', monospace;
  }
  .hero-meta {
    color: var(--text-2);
    font-size: 12px;
    font-weight: 500;
  }

  /* ============ SECTION ============ */
  .section {
    padding: 0 16px;
    margin-bottom: 18px;
  }
  .section-title {
    font-size: 10.5px;
    letter-spacing: 1.4px;
    font-weight: 700;
    color: var(--text-3);
    text-transform: uppercase;
    padding: 0 6px 10px;
  }

  /* ============ JOURNEY CARD ============ */
  .journey {
    background: var(--card);
    border-radius: 18px;
    padding: 20px 20px 18px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--line);
  }
  .journey-date {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .journey-date-icon {
    width: 28px; height: 28px;
    background: var(--brand-soft);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: var(--brand);
  }
  .journey-date-text {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }
  .journey-date-label {
    font-size: 11px;
    color: var(--text-3);
    font-weight: 500;
    margin-left: auto;
  }

  .route {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 10px;
    margin: 4px 0 18px;
  }
  .stop {
    text-align: center;
  }
  .stop-marker {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--brand);
    margin: 0 auto 8px;
    box-shadow: 0 0 0 4px var(--brand-soft);
  }
  .stop-marker.end {
    background: #fff;
    border: 3px solid var(--brand);
  }
  .stop-code {
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: 0.3px;
    line-height: 1.1;
  }
  .stop-type {
    font-size: 10px;
    color: var(--text-3);
    font-weight: 600;
    margin-top: 4px;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .route-middle {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 4px;
    transform: translateY(-12px);
  }
  .route-truck {
    background: var(--brand);
    color: #fff;
    width: 34px; height: 34px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 10px rgba(0, 90, 45, 0.3);
  }
  .route-line {
    height: 2px;
    width: 60px;
    background-image: linear-gradient(to right, var(--brand) 50%, transparent 50%);
    background-size: 6px 2px;
    background-repeat: repeat-x;
    margin-top: 6px;
  }

  .ship-info {
    background: #FAFBFA;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .ship-info-icon {
    width: 32px; height: 32px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: var(--brand);
    flex-shrink: 0;
  }
  .ship-info-meta {
    flex: 1;
    min-width: 0;
  }
  .ship-info-label {
    font-size: 10.5px;
    color: var(--text-3);
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .ship-info-value {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.3px;
  }

  /* ============ INFO GRID ============ */
  .info-grid {
    background: var(--card);
    border-radius: 18px;
    padding: 4px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--line);
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .info-cell {
    padding: 16px 14px;
    position: relative;
  }
  .info-cell + .info-cell::before {
    content: '';
    position: absolute;
    left: 0; top: 14px; bottom: 14px;
    width: 1px;
    background: var(--line);
  }
  .info-cell-label {
    font-size: 10.5px;
    color: var(--text-3);
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .info-cell-label svg { color: var(--text-3); }
  .info-cell-value {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.35;
  }
  .info-cell-value.small {
    font-size: 13.5px;
  }

  /* ============ INCOME ============ */
  .income {
    background: linear-gradient(135deg, #007E3E 0%, var(--brand) 60%, #003E1F 100%);
    border-radius: 18px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 24px rgba(0, 90, 45, 0.25);
  }
  .income::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 90% 10%, rgba(255,255,255,0.18) 0%, transparent 40%),
      radial-gradient(circle at 0% 100%, rgba(255,255,255,0.08) 0%, transparent 50%);
  }
  .income::after {
    content: '';
    position: absolute;
    top: -50%; right: -10%;
    width: 200px; height: 200px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .income-content {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .income-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .income-icon {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    backdrop-filter: blur(4px);
  }
  .income-label-stack { color: #fff; }
  .income-label-top {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.75;
  }
  .income-label-bottom {
    font-size: 13px;
    font-weight: 600;
    margin-top: 2px;
    opacity: 0.95;
  }
  .income-amount {
    color: #fff;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }
  .income-amount span {
    font-weight: 600;
    opacity: 0.85;
    margin-left: 2px;
  }

  /* ============ ACTIONS ============ */
  .actions {
    padding: 6px 16px 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .btn {
    width: 100%;
    padding: 15px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border: none;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
  }
  .btn-primary {
    background: var(--brand);
    color: #fff;
    box-shadow: var(--shadow-cta);
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 24px rgba(0, 90, 45, 0.32);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-danger {
    background: #fff;
    color: var(--danger);
    border: 1.5px solid var(--danger-bg);
  }
  .btn-danger:hover {
    background: var(--danger-bg);
    border-color: var(--danger);
  }
  .btn-danger:active { background: #FBDCD7; }
</style>
</head>
<body>

<div class="phone">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 17h4V5H2v12h3"/><path d="M20 17h2v-3.34a4 4 0 0 0-1.17-2.83L19 9h-5"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
      </div>
      <div>
        <div class="greeting">Xin chào,</div>
        <div class="name">Chu Đức Anh</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="icon-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
      </div>
      <div class="icon-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
    </div>
  </header>

  <!-- BACK NAV -->
  <div class="nav-back">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Quay lại
  </div>

  <!-- HERO CONTAINER CARD (light) -->
  <div class="hero">
    <div class="hero-top">
      <div class="hero-label">Container</div>
      <div class="status-pill">
        <span class="status-dot"></span>
        Chờ ghép
      </div>
    </div>
    <div class="container-no">APLU7151970</div>
    <div class="hero-bottom">
      <div class="type-chip">F20</div>
      <div class="hero-meta">Loại container · 20 feet</div>
    </div>
  </div>

  <!-- JOURNEY -->
  <div class="section">
    <div class="section-title">Lịch trình</div>
    <div class="journey">
      <div class="journey-date">
        <div class="journey-date-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        </div>
        <div class="journey-date-text">21/05/2026</div>
        <div class="journey-date-label">Ngày đi</div>
      </div>

      <div class="route">
        <div class="stop">
          <div class="stop-marker"></div>
          <div class="stop-code">NHĐV</div>
          <div class="stop-type">Điểm đi</div>
        </div>
        <div class="route-middle">
          <div class="route-truck">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 18H3a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v11"/><path d="M14 9h4l4 4v5h-2"/><path d="M9 18h6"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></svg>
          </div>
          <div class="route-line"></div>
        </div>
        <div class="stop">
          <div class="stop-marker end"></div>
          <div class="stop-code">VIP GREEN</div>
          <div class="stop-type">Điểm đến</div>
        </div>
      </div>

      <div class="ship-info">
        <div class="ship-info-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 21c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1s1.2 1 2.5 1c2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M19.4 13l-.5-2.4a2 2 0 0 0-1.9-1.6H6.9a2 2 0 0 0-1.9 1.6L4.6 13"/><path d="M21 13c-1.2 1.2-3 2-5 2H8c-2 0-3.8-.8-5-2"/></svg>
        </div>
        <div class="ship-info-meta">
          <div class="ship-info-label">Số tàu</div>
          <div class="ship-info-value">HAIAN ALFA 073N</div>
        </div>
      </div>
    </div>
  </div>

  <!-- CUSTOMER & OPERATION -->
  <div class="section">
    <div class="section-title">Khách hàng &amp; tác nghiệp</div>
    <div class="info-grid">
      <div class="info-cell">
        <div class="info-cell-label">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4"/><path d="M9 9v.01M9 12v.01M9 15v.01M9 18v.01"/></svg>
          Chủ hàng
        </div>
        <div class="info-cell-value small">CÔNG TY TNHH<br>CẢNG HẢI AN</div>
      </div>
      <div class="info-cell">
        <div class="info-cell-label">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
          Tác nghiệp
        </div>
        <div class="info-cell-value">Chuyển bãi</div>
      </div>
    </div>
  </div>

  <!-- INCOME -->
  <div class="section">
    <div class="section-title">Thu nhập</div>
    <div class="income">
      <div class="income-content">
        <div class="income-left">
          <div class="income-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </div>
          <div class="income-label-stack">
            <div class="income-label-top">Thu nhập</div>
            <div class="income-label-bottom">Chuyến này</div>
          </div>
        </div>
        <div class="income-amount">185.000<span>đ</span></div>
      </div>
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <button class="btn btn-primary">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/></svg>
      Sửa chuyến
    </button>
    <button class="btn btn-danger">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      Xóa chuyến
    </button>
  </div>

</div>

</body>
</html>

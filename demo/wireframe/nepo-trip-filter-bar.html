<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEPO — Thanh lọc chuyến</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #005A2D;
    --green-soft: #E8F1EC;
    --ink: #0F1A14;
    --ink-2: #4B5A52;
    --ink-3: #8A968F;
    --line: #E9ECEA;
    --line-2: #EFF1F0;
    --bg: #F4F6F5;
    --surface: #FFFFFF;
    --field: #F7F8F8;

    --dot-new: #9AA4AD;
    --dot-run: #1D9F5B;
    --dot-done: #2D7FF9;
    --dot-lock: #E0A106;
    --dot-cancel: #E0533D;

    --shadow-card: 0 1px 2px rgba(16,26,20,.04), 0 8px 24px rgba(16,26,20,.06);
    --shadow-pill: 0 1px 1px rgba(16,26,20,.04);
    --radius-card: 20px;
    --radius-pill: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 40px 28px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .num { font-family: 'JetBrains Mono', monospace; font-feature-settings: "tnum"; }

  .card {
    max-width: 1320px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
    padding: 18px;
  }

  /* ── Row 1: status tabs + search ─────────────────── */
  .row-top {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .tabs {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: nowrap;
    overflow-x: auto;
    scrollbar-width: none;
    flex: 1;
    min-width: 0;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    height: 42px;
    padding: 0 14px;
    border: 1px solid var(--line);
    background: var(--surface);
    border-radius: var(--radius-pill);
    cursor: pointer;
    white-space: nowrap;
    color: var(--ink-2);
    font-size: 14.5px;
    font-weight: 600;
    transition: background .16s ease, border-color .16s ease, color .16s ease, box-shadow .16s ease;
    box-shadow: var(--shadow-pill);
  }
  .tab:hover { border-color: #D8DEDB; background: #FCFDFD; }

  .tab .dot {
    width: 7px; height: 7px; border-radius: 50%;
    flex: none;
    background: var(--dot, var(--ink-3));
  }

  .tab .count {
    font-size: 12.5px;
    font-weight: 600;
    min-width: 22px;
    height: 22px;
    padding: 0 6px;
    border-radius: 7px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--line-2);
    color: var(--ink-2);
    transition: background .16s ease, color .16s ease;
  }

  /* zero-count tabs read quieter */
  .tab[data-zero="true"] { color: var(--ink-3); }
  .tab[data-zero="true"] .dot { opacity: .45; }
  .tab[data-zero="true"] .count { color: var(--ink-3); }

  /* active */
  .tab.active {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
    box-shadow: 0 1px 2px rgba(0,90,45,.18), 0 6px 16px rgba(0,90,45,.22);
  }
  .tab.active .dot { background: rgba(255,255,255,.85); opacity: 1; }
  .tab.active .count {
    background: rgba(255,255,255,.20);
    color: #fff;
  }

  /* ── Search ─────────────────── */
  .search {
    position: relative;
    flex: none;
    width: 340px;
  }
  .search svg {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--ink-3);
    pointer-events: none;
  }
  .search input {
    width: 100%;
    height: 42px;
    border: 1px solid var(--line);
    background: var(--field);
    border-radius: var(--radius-pill);
    padding: 0 14px 0 40px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14.5px;
    font-weight: 500;
    color: var(--ink);
    transition: background .16s ease, border-color .16s ease, box-shadow .16s ease;
  }
  .search input::placeholder { color: var(--ink-3); font-weight: 500; }
  .search input:focus {
    outline: none;
    background: var(--surface);
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(0,90,45,.10);
  }

  /* ── divider ─────────────────── */
  .divider { height: 1px; background: var(--line-2); margin: 16px 0; }

  /* ── Row 2: filters ─────────────────── */
  .row-filters {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .filter {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    height: 44px;
    padding: 0 14px;
    border: 1px solid var(--line);
    background: var(--field);
    border-radius: var(--radius-pill);
    cursor: pointer;
    font-size: 14.5px;
    font-weight: 600;
    color: var(--ink);
    white-space: nowrap;
    transition: background .16s ease, border-color .16s ease, box-shadow .16s ease;
  }
  .filter:hover { background: #FCFDFD; border-color: #D8DEDB; }
  .filter.open, .filter:focus-visible {
    outline: none;
    background: var(--surface);
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(0,90,45,.10);
  }
  .filter .lbl-wrap { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.1; }
  .filter .lbl-cap { font-size: 11px; font-weight: 600; color: var(--ink-3); letter-spacing: .01em; }
  .filter .chev { color: var(--ink-3); transition: transform .16s ease; flex: none; }
  .filter.open .chev { transform: rotate(180deg); }
  .filter.active-filter {
    border-color: var(--green);
    background: var(--green-soft);
    color: var(--green);
  }
  .filter.active-filter .lbl-cap { color: rgba(0,90,45,.6); }
  .filter.active-filter .chev { color: var(--green); }

  @media (max-width: 880px) {
    body { padding: 20px 14px; }
    .row-top { flex-direction: column; align-items: stretch; }
    .search { width: 100%; }
    .row-filters { flex-wrap: wrap; }
  }
</style>
</head>
<body>
  <div class="card">

    <!-- Status tabs + search -->
    <div class="row-top">
      <div class="tabs" id="tabs">
        <button class="tab active" data-zero="false">
          <span class="dot" style="--dot:#0F1A14"></span>
          Tất cả
          <span class="count num">3</span>
        </button>
        <button class="tab" data-zero="true">
          <span class="dot" style="--dot:var(--dot-new)"></span>
          Mới tạo
          <span class="count num">0</span>
        </button>
        <button class="tab" data-zero="false">
          <span class="dot" style="--dot:var(--dot-run)"></span>
          Đang chạy
          <span class="count num">2</span>
        </button>
        <button class="tab" data-zero="false">
          <span class="dot" style="--dot:var(--dot-done)"></span>
          Hoàn thành
          <span class="count num">1</span>
        </button>
        <button class="tab" data-zero="true">
          <span class="dot" style="--dot:var(--dot-lock)"></span>
          Đã khóa
          <span class="count num">0</span>
        </button>
        <button class="tab" data-zero="true">
          <span class="dot" style="--dot:var(--dot-cancel)"></span>
          Đã hủy
          <span class="count num">0</span>
        </button>
      </div>

      <div class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" placeholder="Tìm theo mã chuyến, KH, biển số">
      </div>
    </div>

    <div class="divider"></div>

    <!-- Filters -->
    <div class="row-filters">
      <button class="filter">
        <div class="lbl-wrap">
          <span class="lbl-cap">Thời gian</span>
          <span>Tất cả thời gian</span>
        </div>
        <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </button>

      <button class="filter">
        <div class="lbl-wrap">
          <span class="lbl-cap">Phương tiện</span>
          <span>Tất cả xe</span>
        </div>
        <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </button>

      <button class="filter">
        <div class="lbl-wrap">
          <span class="lbl-cap">Khách hàng</span>
          <span>Tất cả khách hàng</span>
        </div>
        <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </button>
    </div>

  </div>

<script>
  // Tab selection
  const tabs = document.querySelectorAll('#tabs .tab');
  tabs.forEach(t => t.addEventListener('click', () => {
    tabs.forEach(x => x.classList.remove('active'));
    t.classList.add('active');
  }));

  // Filter open-state demo
  document.querySelectorAll('.filter').forEach(f => {
    f.addEventListener('click', () => f.classList.toggle('open'));
  });
</script>
</body>
</html>

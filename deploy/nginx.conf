# Nginx configuration for Vantaiphucloc
# Place this file at /etc/nginx/sites-available/vantaiphucloc
# and symlink: ln -s /etc/nginx/sites-available/vantaiphucloc /etc/nginx/sites-enabled/

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name phucloc.tingting.vip;

    # Let's Encrypt ACME challenge (used by Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name phucloc.tingting.vip;

    # SSL certificates managed by Certbot / Let's Encrypt
    # Run: certbot --nginx -d phucloc.tingting.vip
    ssl_certificate     /etc/letsencrypt/live/phucloc.tingting.vip/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/phucloc.tingting.vip/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Photo files (served directly from disk) ──────────────────────────────
    location /photos/ {
        root /opt/vantaiphucloc/data;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── API proxy ──────────────────────────────────────────────────────────────
    # Forward all /api/* requests to the FastAPI backend container
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Frontend ───────────────────────────────────────────────────────────────
    # Proxy to frontend container (nginx serving built static files)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# Production Docker Compose — pull pre-built images from Docker Hub
# Usage: docker compose -f deploy/docker-compose.prod.yml up -d
name: vantaiphucloc

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vantaiphucloc
      POSTGRES_PASSWORD: vantaiphucloc
      POSTGRES_DB: vantaihanghoa
    volumes:
      - /opt/vantaiphucloc/data/postgres:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vantaiphucloc -d vantaihanghoa"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes
    expose:
      - "6379"
    volumes:
      - /opt/vantaiphucloc/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: franknguyenvd/phucloc-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://vantaiphucloc:vantaiphucloc@postgres:5432/vantaihanghoa
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: franknguyenvd/phucloc-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://vantaiphucloc:vantaiphucloc@postgres:5432/vantaihanghoa
    command: ["arq", "app.workers.worker.WorkerSettings"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: franknguyenvd/phucloc-frontend:latest
    restart: unless-stopped
    expose:
      - "80"
    ports:
      - "127.0.0.1:3000:80"

  adminer:
    image: adminer:latest
    restart: unless-stopped
    expose:
      - "8080"
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

